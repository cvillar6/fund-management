<header class="border-b border-slate-200 bg-slate-900 text-white">
  <div class="mx-auto w-full max-w-6xl px-6 py-4">
    <div class="flex items-center justify-between">
      <img src="/ceiba.webp" alt="Ceiba logo" class="h-10" />

      <div class="text-right">
        <p class="text-sm text-slate-300">Hello, {{ userName }}</p>
        <p class="text-base font-semibold">
          Available balance:
          {{ availableBalance() | currency: 'COP' : 'symbol' : '1.0-0' }}
        </p>
      </div>
    </div>
  </div>
</header>
